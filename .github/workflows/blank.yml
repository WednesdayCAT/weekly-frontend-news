name: 每周一自动生成前端资讯
on:
  schedule:
    - cron: "0 0 * * 1"   # 每周一 0:00 UTC = 北京时间 8:00
  workflow_dispatch:      # 允许手动测试运行（非常重要）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 必须给写入权限，否则无法推送

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: 运行生成脚本
        run: |
          python scripts/generate_news.py

      - name: 提交并推送到 GitHub
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git commit -m "feat: 自动生成本周前端资讯"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
