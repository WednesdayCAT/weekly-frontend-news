# 每周生成前端技术周刊
name: Weekly Frontend News

on:
  schedule:
    # 每周一 8:00 (北京时间) = 周日 0:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate weekly news
        run: npm run generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build index and RSS
        run: |
          npm run index
          npm run rss
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add archives/ rss.xml feed.json atom.xml
          git commit -m "chore: 自动更新前端周刊 $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
