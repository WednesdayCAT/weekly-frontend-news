# 前端技术周报全自动生成-提交工作流
name: Auto Generate Weekly Frontend News
# 触发规则：每周一UTC0点（北京时间8点）+ 手动触发
on:
  schedule:
    - cron: '0 0 * * 1'  # 定时触发：北京时间每周一8:00
  workflow_dispatch:     # 手动触发：Actions页面可点击运行
# 执行任务
jobs:
  generate-and-push:
    runs-on: ubuntu-latest  # GitHub官方Ubuntu服务器
    timeout-minutes: 10     # 超时时间：10分钟
    steps:
      # 步骤1：拉取仓库最新代码（完整历史）
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整Git历史，避免提交报错
          ref: main       # 拉取main分支（若你的分支是master，改为master）
      # 步骤2：配置Python3.11环境（官方镜像，无需额外安装）
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'    # 缓存pip依赖，加快运行速度
      # 步骤3：安装脚本依赖（requests/feedparser/beautifulsoup4）
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4
      # 步骤4：运行核心生成脚本
      - name: Run Generate Script
        run: python scripts/generate_weekly_news.py
      # 步骤5：配置Git提交身份（GitHub Actions官方身份）
      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      # 步骤6：Git提交+推送（有文件变化才执行，避免空提交）
      - name: Git Add & Commit & Push
        run: |
          # 检查是否有文件修改/新增
          if [ -n "$(git status --porcelain)" ]; then
            # 提取周数，生成规范提交信息
            WEEK_NUM=$(date +%Y)-$(($(date +%V)-1))周
            git add docs/
            git commit -m "feat: 生成${WEEK_NUM}前端技术周报"
            git push origin main  # 推送到main分支（若为master，改为master）
            echo "✅ 周报已成功提交到仓库！"
          else
            echo "ℹ️  暂无文件变化，无需提交！"
          fi