name: Auto Generate Weekly Frontend News
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5  # 升级到 v5，支持 Node.js 24
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Python 3.11
        uses: actions/setup-python@v6  # 升级到 v6，支持 Node.js 24
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run Generate Script
        run: python scripts/generate_weekly_news.py

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Git Add & Commit & Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            WEEK_NUM=$(date +%Y)-$(($(date +%V)-1))周
            git add docs/
            git commit -m "feat: 生成${WEEK_NUM}前端技术周报"
            git push origin main
            echo "✅ 周报已成功提交到仓库！"
          else
            echo "ℹ️  暂无文件变化，无需提交！"
          fi
