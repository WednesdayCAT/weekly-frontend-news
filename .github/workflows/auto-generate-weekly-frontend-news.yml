name: Auto Generate Weekly Frontend News
on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 0点（北京时间8点）
  workflow_dispatch:

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：给Actions写权限
    steps:
      - name: Checkout Repository (with Write Permissions)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 关键修复：使用GitHub自带的Token授权，解决权限拒绝
          token: ${{ secrets.GITHUB_TOKEN }}

      # 解决 setup-python 告警与依赖问题
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 关闭自动缓存逻辑，避免告警
          cache: 'none'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run Generate Script
        run: python scripts/generate_weekly_news.py

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Git Add & Commit & Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            WEEK_NUM=$(date +%Y)-$(($(date +%V)-1))周
            git add docs/
            git commit -m "feat: 生成${WEEK_NUM}前端技术周报"
            git push origin main
            echo "✅ 周报已成功提交到仓库！"
          else
            echo "ℹ️  暂无文件变化，无需提交！"
          fi
