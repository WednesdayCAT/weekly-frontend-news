name: Auto Generate Weekly Frontend News
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # 解决 setup-python 报错的关键：关闭自动依赖安装
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          # 关闭自动寻找 requirements.txt 的功能
          cache-dependency-path: '**/requirements.txt'
          # 明确指定，避免它自动找文件
          allow-editable-build: false

      # 改为手动安装依赖，不再依赖 setup-python 的自动功能
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run Generate Script
        run: python scripts/generate_weekly_news.py

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Git Add & Commit & Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            WEEK_NUM=$(date +%Y)-$(($(date +%V)-1))周
            git add docs/
            git commit -m "feat: 生成${WEEK_NUM}前端技术周报"
            git push origin main
            echo "✅ 周报已成功提交到仓库！"
          else
            echo "ℹ️  暂无文件变化，无需提交！"
          fi
